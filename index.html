<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shut The Box</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jersey+20&family=Pixelify+Sans:wght@400..700&family=Science+Gothic:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-container">
      <!-- Menu page -->
      <div id="mainmenu-screen" class="screen">
        <img class="logo" src="images/logo.jpg" alt="shut the box logo" />
        <div class="btn-container">
          <button class="menu-btn start-btn" id="start-game-btn">
            Start Game
          </button>
          <button class="menu-btn" id="rules-btn">Rules</button>
        </div>
      </div>
      <!-- rules page -->
      <div id="rules-screen" class="screen">
        <h1>HII</h1>
      </div>
      <!-- game page -->
      <div id="game-screen" class="screen active">
        <h1>Game Screen</h1>
      </div>

      <!-- results page -->
      <div id="result-screen" class="screen"></div>
    </main>
    <script src="index.js"></script>
  </body>
</html>
