<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shut The Box</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jersey+20&family=Pixelify+Sans:wght@400..700&family=Science+Gothic:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-container">
      <!-- Menu page -->
      <div id="mainmenu-screen" class="screen">
        <div class="logoimg">
          <img class="logo" src="images/logo.jpg" alt="shut the box logo" />
        </div>
        <div class="btn-container">
          <button class="menu-btn start-btn" id="start-game-btn">
            Start Game
          </button>
          <button class="menu-btn" id="rules-btn">Rules</button>
        </div>
      </div>
      <!-- rules page -->
      <div id="rules-screen" class="screen">
        <h1>HII</h1>
      </div>
      <!-- game page -->
      <div id="game-screen" class="screen active">
        <div class="game-header">
          <h1>Game Board</h1>
          <div class="selection">
            <h3>Sum: You rolled 5</h3>
            <p>Selection</p>
            <p>Selection count</p>
          </div>
        </div>
        <div class="game-board">
          <div class="tiles">1</div>
          <div class="tiles">2</div>
          <div class="tiles">3</div>
          <div class="tiles">4</div>
          <div class="tiles">5</div>
          <div class="tiles">6</div>
          <div class="tiles">7</div>
          <div class="tiles">8</div>
          <div class="tiles">9</div>
        </div>
        <div class="dices">
          <img
            class="dice-img"
            id="dice-1"
            src="images/inverted-dice-1.png"
            alt="dice1 img"
          />
          <img
            class="dice-img"
            id="dice-2"
            src="images/inverted-dice-1.png"
            alt="dice2 img"
          />
        </div>
        <div class="dice-submit-container">
          <button class="dice-btn" id="dice-btn">Roll Dice</button>
          <button class="submit-btn">Submit selection</button>
        </div>
      </div>

      <!-- results page -->
      <div id="result-screen" class="screen"></div>
    </main>
    <script src="index.js"></script>
  </body>
</html>
